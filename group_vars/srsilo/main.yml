---
# Group variables for srsilo hosts
# These override the role defaults in roles/srsilo/defaults/main.yml

# =============================================================================
# Base Configuration
# =============================================================================

srsilo_base_path: /opt/srsilo
srsilo_tools_path: "{{ srsilo_base_path }}/tools"

# User and group
srsilo_user: srsilo
srsilo_group: srsilo

# =============================================================================
# Multi-Virus Configuration
# =============================================================================

# Enable specific viruses for this host group
# Add viruses here as they become ready for production
srsilo_enabled_viruses:
  - covid
  - rsva    # ✅ Enabled in PR6

# Per-virus configuration overrides
# Use this to override global defaults for specific viruses
srsilo_virus_config:
  covid:
    fetch_days: 90
    fetch_max_reads: 172500000    # 172.5M reads - high volume
    chunk_size: 1000000           # Large chunks for production
    docker_memory_limit: 200g
  rsva:
    fetch_days: 90
    fetch_max_reads: 50000000     # 50M reads - lower volume expected
    chunk_size: 500000            # Smaller chunks
    docker_memory_limit: 50g

# =============================================================================
# API Configuration (Global Defaults)
# =============================================================================
# NOTE: These serve as fallback defaults until PR7 implements per-virus
# config merging. Per-virus overrides in srsilo_virus_config are not yet
# automatically applied - that requires the set_fact merging logic from PR7.

srsilo_api_base_url: https://api.db.wasap.genspectrum.org
srsilo_fetch_days: 45
srsilo_fetch_max_reads: 172500000   # 172.5M reads for production

# =============================================================================
# Retention Policy
# =============================================================================

srsilo_retention_days: 7
srsilo_retention_min_keep: 2

# =============================================================================
# Processing Configuration (Global Defaults)
# =============================================================================
# NOTE: These serve as fallback defaults until PR7 implements per-virus
# config merging. Per-virus overrides in srsilo_virus_config are not yet
# automatically applied - that requires the set_fact merging logic from PR7.
# TODO PR7: Remove these once virus-specific config merging is implemented.

# Chunk size for splitting reads - 377GB RAM server
srsilo_chunk_size: 1000000

# Docker memory limits - 90% of 377GB RAM
srsilo_docker_memory_limit: 340g

# =============================================================================
# Repository Path
# =============================================================================

wisepulse_repo_path: /opt/WisePulse

# =============================================================================
# Testing Notes
# =============================================================================
# For testing with constrained resources (8GB RAM), override with:
#   ansible-playbook ... -e "@playbooks/srsilo/vars/test_vars.yml"
# Test overrides: 7g memory, 30 days, 5M reads, 30k chunk size

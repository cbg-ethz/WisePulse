---
# Entry point for updating a SINGLE virus
# Usage: ansible-playbook playbooks/srsilo/update-pipeline.yml -e "srsilo_virus=rsva"
#
# For all enabled viruses, use update-all-viruses.yml instead
#
# This playbook is a thin wrapper that:
# 1. Sets up the virus context from srsilo_virus parameter
# 2. Delegates to _tasks/run-single-virus-pipeline.yml (shared with update-all-viruses.yml)

- name: srSILO Update Pipeline - Single Virus
  hosts: srsilo
  gather_facts: yes

  vars_files:
    - vars/common.yml

  pre_tasks:
    # Load role defaults to access srsilo_viruses registry
    - name: Load srsilo role defaults
      include_vars:
        file: "{{ playbook_dir }}/../../roles/srsilo/defaults/main.yml"

    - name: Validate virus parameter is provided
      assert:
        that: srsilo_virus is defined
        fail_msg: "srsilo_virus must be specified. Usage: ansible-playbook update-pipeline.yml -e 'srsilo_virus=covid'"

    - name: Validate virus exists in registry
      assert:
        that: srsilo_virus in srsilo_viruses
        fail_msg: "Unknown virus '{{ srsilo_virus }}' - not in srsilo_viruses registry. Available: {{ srsilo_viruses.keys() | list | join(', ') }}"

    - name: Validate virus configuration exists
      assert:
        that:
          - srsilo_virus in srsilo_virus_config
          - srsilo_virus_config[srsilo_virus].fetch_days is defined
          - srsilo_virus_config[srsilo_virus].fetch_max_reads is defined
          - srsilo_virus_config[srsilo_virus].chunk_size is defined
          - srsilo_virus_config[srsilo_virus].docker_memory_limit is defined
        fail_msg: "Missing required configuration for virus '{{ srsilo_virus }}' in srsilo_virus_config"

    - name: Display target virus
      debug:
        msg: "Will process single virus: {{ srsilo_virus }}"

  tasks:
    # Use the same task file as update-all-viruses.yml
    # This ensures both playbooks have identical pipeline logic
    - name: Run pipeline for {{ srsilo_virus }}
      include_tasks: _tasks/run-single-virus-pipeline.yml
      vars:
        current_virus: "{{ srsilo_virus }}"

  post_tasks:
    - name: Pipeline complete
      debug:
        msg: "Completed processing virus: {{ srsilo_virus }}"

---
# Test variables for srSILO update pipeline
# These override group_vars/srsilo/main.yml for safe testing with reduced resources
#
# Usage (single virus):
#   ansible-playbook update-pipeline.yml -e "srsilo_virus=covid" -e "@playbooks/srsilo/vars/test_vars.yml"
#
# Usage (all viruses):
#   ansible-playbook update-all-viruses.yml -e "@playbooks/srsilo/vars/test_vars.yml"

# Enabled viruses for testing (can be overridden to test single virus)
srsilo_enabled_viruses:
  - covid
  - rsva

# Per-virus configuration overrides for test environment (8GB RAM)
srsilo_virus_config:
  covid:
    fetch_days: 45                  # Fetch only 45 days instead of 90
    fetch_max_reads: 5000000        # Limit to 5M reads instead of 172.5M
    chunk_size: 30000               # Reduced for 8GB RAM test environment
    docker_memory_limit: 7g         # 90% of 8GB RAM
  rsva:
    fetch_days: 45                  # Fetch only 45 days instead of 90
    fetch_max_reads: 2000000        # Limit to 2M reads instead of 50M
    chunk_size: 30000               # Reduced for 8GB RAM test environment
    docker_memory_limit: 7g         # 90% of 8GB RAM
  rsvb:
    fetch_days: 45                  # Fetch only 45 days instead of 90
    fetch_max_reads: 2000000        # Limit to 2M reads instead of 50M
    chunk_size: 30000               # Reduced for 8GB RAM test environment
    docker_memory_limit: 7g         # 90% of 8GB RAM

# Shared configuration (same as production)
srsilo_api_base_url: https://api.db.wasap.genspectrum.org

# Retention policy - More aggressive for testing
srsilo_retention_days: 3            # More aggressive cleanup for testing
srsilo_retention_min_keep: 2

# Optional: Override start date for testing
# Uncomment and adjust if you want to test a specific date range
# fetch_start_date: "2025-10-23"

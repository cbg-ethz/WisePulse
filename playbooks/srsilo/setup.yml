---
- name: srSILO Setup - Initial Setup and Configuration
  hosts: srsilo
  gather_facts: yes

  vars_files:
    - vars/common.yml

  pre_tasks:
    - name: Load srsilo role defaults
      include_vars:
        file: "{{ playbook_dir }}/../../roles/srsilo/defaults/main.yml"

  tasks:
    - name: Display configuration
      debug:
        msg:
          - "=== srSILO Setup Configuration ==="
          - "User: {{ srsilo_user }}"
          - "Group: {{ srsilo_group }}"
          - "Base path: {{ srsilo_base_path }}"
          - "Tools path: {{ srsilo_tools_path }}"
          - "API: {{ srsilo_api_base_url }}"
          - "Enabled viruses: {{ srsilo_enabled_viruses | join(', ') }}"

    - name: Build Rust tools (once, shared across viruses)
      include_role:
        name: srsilo
        tasks_from: build_tools
      tags: [build]

    - name: Setup per-virus prerequisites and configs
      include_tasks: _tasks/setup-single-virus.yml
      loop: "{{ srsilo_enabled_viruses }}"
      loop_control:
        loop_var: current_virus
        label: "{{ current_virus }}"
      tags: [prerequisites, config]

    - name: Display setup complete message
      debug:
        msg:
          - "=== srSILO Setup Complete ==="
          - "Binaries: {{ srsilo_tools_path }}/target/release/"
          - "Data will be stored in: {{ srsilo_base_path }}"
          - "Logs: Use 'sudo journalctl -t srsilo-pipeline' to view logs"
          - ""
          - "Next steps:"
          - "  - Run playbooks/srsilo/update-pipeline.yml to process data"
          - "  - Setup systemd timer for automated runs"

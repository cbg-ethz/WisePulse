---
# Default variables for loculus role
# These can be overridden in group_vars, host_vars, or playbook vars

# Temporary directory for deployment files
loculus_temp_dir: "/tmp/loculus-deployment-{{ ansible_date_time.epoch }}"

# Whether to clean up temporary files after deployment
loculus_cleanup_temp_files: true

# Kubeconfig path - defaults to the remote user's home directory.
# Must use ansible_env.HOME (a remote fact), not lookup('env', 'HOME'),
# since lookup() always evaluates on the control machine, not the
# managed node.
# Note: Run playbook without sudo (use --ask-become-pass instead)
loculus_kubeconfig_path: "{{ ansible_env.HOME }}/.kube/config"

# Loculus repository configuration
loculus_repo_path: "/opt/loculus/loculus"
loculus_commit_sha: "main"  # Default, should be overridden in group_vars

# Derived path to Helm chart (subdirectory within the repo)
loculus_helm_chart_path: "{{ loculus_repo_path }}/kubernetes/loculus"

# Static images to deploy
# Add new virus images here as needed
virus_images:
  - covid-virus.png
  - rsv-virus.png

# Static branding/logo images
static_images:
  - wasap-logo.png

---
# Deploy application configuration files

- name: Ensure virus config directory exists
  file:
    path: "{{ srsilo_virus_config_path }}"
    state: directory
    owner: "{{ srsilo_user }}"
    group: "{{ srsilo_group }}"
    mode: '0755'
  become: yes

- name: Deploy SILO configuration files
  copy:
    src: "{{ item.src }}"
    dest: "{{ srsilo_virus_config_path }}/{{ item.dest }}"
    owner: "{{ srsilo_user }}"
    group: "{{ srsilo_group }}"
    mode: '0644'
  become: yes
  loop:
    - { src: 'viruses/{{ srsilo_virus }}/database_config.yaml', dest: 'database_config.yaml' }
    - { src: 'viruses/{{ srsilo_virus }}/preprocessing_config.yaml', dest: 'preprocessing_config.yaml' }
    - { src: 'viruses/{{ srsilo_virus }}/reference_genomes.json', dest: 'reference_genomes.json' }

- name: Display config deployment complete message
  debug:
    msg:
      - "✓ Configuration files deployed for {{ srsilo_virus }}"
      - "  database_config.yaml"
      - "  preprocessing_config.yaml"
      - "  reference_genomes.json"
      - "  Destination: {{ srsilo_virus_config_path }}/"
